<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scott Maclean | Colour Grader Sydney</title>
    <meta name="description" content="Colour grader in Sydney with 30 years experience in film, television, and high-end commercials.">
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff; 
            color: #333333; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container { 
            max-width: 700px; 
            padding: 40px; 
        }

        /* Logo set to be large and responsive */
        .logo { 
            max-width: 600px; 
            width: 100%; 
            height: auto; 
            margin-bottom: 40px; 
        }

        p { 
            font-size: 1.1rem; 
            line-height: 1.7; 
            margin-bottom: 40px; 
            color: #555555; 
        }

        .btn {
            display: inline-block;
            padding: 18px 35px;
            background-color: #BF5422; /* Burnt Orange */
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: #9A421C; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Morebetter Logo" class="logo">
        
        <p>I specialize in high-end colour grading and creative look development for commercials, advertising campaigns, and branded content. With 30 years of industry experience, I bring a wealth of cinematic knowledge to every project.</p>
        
        <a href="https://vimeo.com/scottmaclean" class="btn">VIEW PORTFOLIO ON VIMEO</a>
    </div>
</body>
</html>
